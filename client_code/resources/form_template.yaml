          padding: [null, 35%, null, null]
        text: Explore guides and factsheets to help you understand the financing and ownership options available for community energy projects.
      type: form:dep_9kcxnwm3upyjd:_Components.Heading
    - layout_properties: {full_width_row: true, grid_position: 'CNHJAC,PEGHDF'}
      name: text_1
      properties:
        font_size: 18
        spacing:
          margin: [2%, '0', 2%, null]
          padding: [null, null, null, null]
        text: |-
          Find tools, guides, and information to support your community energy journey. Our resources are designed to make community energy financing more accessible and easier to navigate.

          Everything we build is shaped by what our respondents tell us they need. Rather than guessing at which topics matter most, we've drawn directly on survey responses to focus our efforts on the financing mechanisms people are most eager to understand. The chart to the right shows where that interest is concentrated:  comparing the approaches respondents are already using against the ones they most want to learn more about. These insights guide how we prioritize new guides and tools, so the resources you find here speak to the real questions and gaps facing community energy projects today.
      type: form:dep_9kcxnwm3upyjd:_Components.Text
