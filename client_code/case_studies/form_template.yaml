      name: rich_text_1
      properties:
        content: |-
          <p>We're developing in-depth case studies that show how Canadian community energy projects have navigated the financing journey — from choosing ownership models and assembling capital stacks to measuring outcomes and impacts on the ground. These stories will bring the Navigator's data to life, showing how real communities used the capital sources, ownership models, and strategies you can explore throughout the Navigator.</p>

          <p>Interviews go deeper than the survey — giving project teams the chance to share context, reflect on what worked, and describe challenges that are hard to capture online.</p>

          <ul>
            <li>How the community was involved in financial decisions</li>
            <li>How financing was chosen — who led the process and what alternatives were considered</li>
            <li>How benefits are shared and whether outcomes reflect community priorities</li>
          </ul>

          <p><em>Participation is voluntary. Interviewees can review their contributions before publication.</em></p>
        font_size: 18
        foreground: ''
        format: restricted_html
        spacing:
          margin: ['0', null, '0', null]
          padding: ['0', null, '0', null]
      type: RichText
