        font_size: 18
        scale: large
        text: |-
          Phase 2 focuses on expanding the reach and depth of the research through new collaborations, further data collection, and iterative improvements to the Navigator. User feedback gathered through a post-launch webinar will guide refinements to the platform's visualizations and functionality, ensuring it continues to meet the evolving needs of practitioners, policymakers, and community members.

          Phase 3 shifts emphasis toward broader dissemination and long-term accessibility. Research findings will be shared through peer-reviewed publications, conference presentations, policy briefs, fact sheets, and case studies. The Navigator will continue to be refined, and the underlying dataset will be prepared for open-access publication, making the evidence base available to researchers, funders, and communities beyond the project team.
      type: form:dep_9kcxnwm3upyjd:_Components.Text
    - components:
