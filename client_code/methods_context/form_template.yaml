    - layout_properties: {grid_position: 'WVJHYA,XOAWUX'}
      name: rich_text_1
      properties:
        content: |-
          The Community Energy Finance Navigator is a free, open platform designed to help community groups, project developers, policymakers, investors, and anyone curious about community energy financing explore how projects across Canada are structured, financed, and governed. It does not assume prior knowledge of energy finance or research methods.

          The Navigator is built on data from an ongoing national research project led by the Impact Investing Hub and Accelerating Community Energy Transformation (ACET) at the University of Victoria. CET is funded through the Canada First Research Excellence Fund (CFREF) and collaborates with communities to co-create equitable and resilient clean energy solutions that generate local economic opportunities and strengthen community autonomy. The project combines a Canada-wide survey with in-depth interviews with practitioners, community members, and project leaders directly involved in community energy development.
