          properties:
            content: |-
              <h5>COMPLIMENTARY RESEARCH</h5>
              <h4 style="font-family: serif; margin-top: 0; font-weight: bold; font-size: 1.2em;">Justice, equity & the energy transition</h4>
              <p>A parallel workstream within the broader ACET project - led by PhD Candidate Pavel Soriano Hernandez - analyzes the same dataset through an equity and justice lens, examining how financing and governance structures shape who benefits and who bears risk in the clean energy transition. This work explores whether various funding and financing models advance energy justice by ensuring fair, inclusive, and equitable access to the economic, social, and environmental benefits of clean energy. Findings from this workstream may be integrated into a future version of the Navigator.</p>
