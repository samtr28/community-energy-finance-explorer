    - layout_properties: {full_width_row: true, grid_position: 'VAKWIG,LHLQJJ'}
      name: text_1
      properties:
        font_size: 18
        scale: large
        spacing:
          padding: [null, '16', null, null]
        text: |-
          Community energy initiatives are widely discussed in the context of Canada's low-carbon transition, particularly in remote, rural, and Indigenous settings where they are often expected to support local economic development and energy autonomy alongside decarbonization goals. Federal investment in this space has been substantial - Natural Resources Canada's Clean Energy for Rural and Remote Communities (CERRC) program has supported 111 projects nationally - yet many communities continue to face significant barriers to accessing capital for renewable energy development.

          These barriers are not unique to Canada, but they are poorly documented in the Canadian context. Unlike the UK and EU -where systematic, project-level data on community energy financing has been used to support evidence-based policy and dedicated financing programs - Canada lacks a comparable shared record of how projects are structured, what instruments are used, and which approaches have proved viable. This project is an effort to begin building that evidence base.
      type: form:dep_9kcxnwm3upyjd:_Components.Text
    - components:
      - components:
        - layout_properties: {slot: card-content-container-slot}
          name: rich_text_4
          properties:
            content: |-
              <h5>ACCESS BARRIER</h5>
              <h4 style="font-family: serif; margin-top: 0; font-weight: bold; font-size: 1.2em;">Difficulty Securing Capital</h4>
              <p>Accessing financing remains a persistent challenge for community projects. Barriers include high transaction costs, collateral requirements, geographic constraints limiting access to traditional lenders, and investor perceptions of elevated risk or limited returns.</p>
            font_size: 16
            foreground: theme:On Tertiary Container
