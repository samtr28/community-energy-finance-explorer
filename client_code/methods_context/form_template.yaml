    - layout_properties: {full_width_row: true, grid_position: 'AOGOGQ,CNHTZS'}
      name: text_2
      properties: {font_size: 18, scale: large, text: 'One of the main difficulties in researching this sector is the term itself. "Community energy" is applied to a wide range of project types including Indigenous-owned utilities, neighbourhood solar cooperatives, municipally supported geothermal, with very different arrangements of ownership, governance, and benefit distribution. In the absence of a single, widely accepted definition of community energy in Canada, a scorecard was developed to evaluate projects across six dimensions, and allows the dataset to reflect the range of arrangements that practitioners actually describe as community energy in practice.'}
      type: form:dep_9kcxnwm3upyjd:_Components.Text
