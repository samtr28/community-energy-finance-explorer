    - layout_properties: {full_width_row: true, grid_position: 'TKPHZS,KKFLSV'}
      name: text_3
      properties:
        font_size: 18
        scale: large
        spacing:
          padding: [null, '0', null, null]
        text: A national survey was developed and deployed using the REDCap platform to collect project-level data on financing and funding instruments, ownership and governance structures, and community benefit mechanisms. The survey was developed iteratively through expert review and piloting with practitioners active in community energy financing, and continues to evolve as new projects and contexts are added to the dataset.Participants were selected on the basis of in-depth knowledge of a specific project's community context, development process, and financing structure, including project managers, finance leads, and energy coordinators. Both completed projects and those currently under construction were eligible for inclusion. Each survey focused on a single project, required approximately 30-45 minutes to complete, and participants received a honorarium in recognition of their time.
      type: form:dep_9kcxnwm3upyjd:_Components.Text
    - layout_properties: {grid_position: 'TKPHZS,NLITRQ TACIRU,ADYYHV'}
      name: text_4
      properties: {font_size: 18, scale: large, text: 'Semi-structured interviews complement the survey by capturing perspectives that quantitative data cannot easily convey, including how financial mechanisms shape participation, benefit distribution, and perceived fairness. Participants are purposefully selected for their ability to speak to a project''s financial and governance arrangements, or their direct experience of community impact - drawing on project leaders, community members, Indigenous representatives, and local government actors. Each case study includes up to four interviews, with participants receiving an honorarium for their time.'}
      type: form:dep_9kcxnwm3upyjd:_Components.Text
    - layout_properties: {grid_position: 'TKPHZS,NLITRQ UIGEVW,QMDEMI'}
      name: spacer_2
      properties: {height: 5vh}
