                <h4 style="font-family: serif; margin-top: 0; font-weight: bold; font-size: 1.2em;">No Shared Evidence Base</h4>
                <p>Canada lacks the systematic, project-level data on community energy that jurisdictions like the UK and EU have used to build evidence-based policy and sector support. This gap leaves communities, investors, and policymakers without the evidence base needed to make informed decisions.</p>
