    - layout_properties: {full_width_row: true, grid_position: 'TKPHZS,KKFLSV'}
      name: text_3
      properties:
        font_size: 18
        scale: large
        text: "A national survey was developed and deployed using the REDCap platform. It collects project-level data on financing and funding instruments, ownership and governance structures, and community benefit mechanisms. The survey was developed iteratively through expert review and piloting with practitioners active in community energy financing and continues to evolve as new projects and contexts are added to the dataset. \n\nParticipants are recruited through targeted outreach to project leaders and developers, complemented by snowball sampling. Data collection is ongoing. We are primarily seeking individuals with in-depth knowledge of a specific project's community context, development process, and financing structure - including project managers, finance leads, energy coordinators, and similar roles. Completed projects and those currently under construction are both eligible.\n\nThe survey takes approximately 30-45 minutes to complete and participants receive a $95 honorarium in recognition of their time. Each survey should focus on a single project."
      type: form:dep_9kcxnwm3upyjd:_Components.Text
    - layout_properties: {grid_position: 'TKPHZS,NLITRQ'}
      name: text_4
      properties: {font_size: 18, scale: large, text: 'Semi-structured interviews complement the survey by revealing perspectives that quantitative data cannot easily capture. Participants are purposefully selected based on two criteria: their ability to speak to a project''s financial and governance arrangements, or their direct experience of how a project has affected their community. This includes project leaders, community members, Indigenous representatives, and local government actors, and is not limited to those with formal involvement in project development or decision-making.'}
      type: form:dep_9kcxnwm3upyjd:_Components.Text
