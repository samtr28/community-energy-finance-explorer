              <h4 style="font-family: serif; margin-top: 0; font-weight: bold; font-size: 1.2em;">Limited Financing Expertise in Community Teams</h4>
              <p>Community project teams, many of whom are volunteers, typically lack specialist experience in renewable energy financing. Without accessible documentation of how other projects have been structured, identifying viable financing pathways is difficult, even when options exist.</p>
