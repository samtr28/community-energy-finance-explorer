          type: form:dep_9kcxnwm3upyjd:_Components.Heading
        - layout_properties: {slot: card-content-container-slot}
          name: rich_text_2
          properties:
            content: |-
              <p>
                <strong>Outcomes and impacts:</strong> the benefits, changes, or results associated with a project. These may include environmental, economic, financial, social, and community benefits.<br><br>
                <strong>GHG reductions:</strong> estimated reductions in greenhouse gas emissions, usually expressed in tonnes of carbon dioxide equivalent.<br><br>
                <strong>Cumulative GHG reductions:</strong> the total estimated annual emissions reductions added over a period of time, such as from project start through 2050.<br><br>
                <strong>GHG reduction calculation method:</strong> the tool, model, spreadsheet, or process used to estimate a project's emissions reductions.<br><br>
                <strong>Operational cost coverage:</strong> whether a project reports being able to cover ongoing operating expenses after it becomes operational. These could include maintenance, monitoring, insurance, administration, and other ongoing staff costs.<br><br>
                <strong>Financial return expectations:</strong> the financial outcomes a project expected to achieve. These may include investor returns, surplus revenue, avoided energy costs, or funds available for reinvestment.
