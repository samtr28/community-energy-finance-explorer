      name: rich_text_1
      properties:
        background: ''
        content: |-
          <p>Outcomes and impacts are often central to how community energy projects are described and justified: to funders, to local governments, and to communities themselves. They can include economic contributions like local jobs and revenue, environmental results like avoided greenhouse gas emissions, and broader benefits like energy affordability or energy sovereignty and security. <strong>For communities, tangible outcomes can help demonstrate the value of participation in the energy transition and support the case for deeper local involvement over time.</strong></p>

          <p>Outcomes are also uneven in how they are measured, reported, and verified. Not all projects track the same indicators, and definitions can vary across contexts. The data shown here reflects what projects have reported, which means gaps and inconsistencies should be expected. We present this information to help users explore patterns and compare across projects, while recognizing that the full picture of any project's impact is rarely captured in a single number.</p>
        font_size: 18
        format: restricted_html
      type: RichText
    - components:
      - components:
        - layout_properties: {slot: card-content-container-slot}
          name: heading_9
          properties: {bold: true, font_family: ser, font_size: 20, icon: 'mi:notification_important', scale: medium, style: title, text: Pilot Dataset Notice, text_color: 'theme:Error'}
          type: form:dep_9kcxnwm3upyjd:_Components.Heading
        - layout_properties: {slot: card-content-container-slot}
          name: rich_text_7
          properties:
            content: |-
              <p>
               This is a growing pilot dataset, not a complete national census of community-led clean energy in Canada. The results show patterns from participating projects only. As more project teams contribute data, the insights will become more complete and more reflective of the diversity of projects across the country. Help make the Navigator more accurate and representative by adding your project or encouraging your network to contribute data.
              </p>
            font_size: 16
