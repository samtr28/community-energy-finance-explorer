        - layout_properties: {slot: card-content-container-slot}
          name: rich_text_7
          properties:
            content: |-
              <p>
               This is a growing pilot dataset, not a complete national census of community-led clean energy in Canada. The results show patterns from participating projects only. As more project teams contribute data, the insights will become more complete and more reflective of the diversity of projects across the country. Help make the Navigator more accurate and representative by adding your project or encouraging your network to contribute data.
              </p>
            font_size: 16
