          This section looks inside each broad financing category to show where capital comes from and how long different types of funding can take to secure. Financing categories such as grants, debt, community financing, equity, and internal capital, can each involve different providers, requirements, timelines, risk tolerance, and levels of effort.  As more projects are added to the dataset, the data will help users see which type of funding providers are active in community energy finance, how they differ, and where gaps may exist.

          Together, these charts help communities identify possible funding pathways and plan more realistic timelines. They also help funders, policymakers, and intermediaries see where delays may create barriers and where better support may be needed.
