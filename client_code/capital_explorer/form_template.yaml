        - layout_properties: {slot: card-content-container-slot}
          name: rich_text_2
          properties:
            content: |-
              <p><strong>Capital stack:</strong> the mix of funding sources that add up to the total project cost.</p>
              <p><strong>Capital source:</strong> where the money comes from, such as government programs, bank or non-bank lenders, investors, community members, owners, or partners.</p>
              <p><strong>Financing category:</strong> a broad grouping of capital, such as grants, debt, community financing, external equity, or internal capital.</p>
              <p><strong>Financing mechanism:</strong> the practical way capital is raised or provided, including through the use of financial instruments such as a term loan, grant, community bond, co-op share, or other arrangements such as crowdfunding campaigns, or owner contributions.</p>
              <p><strong>Total project cost:</strong> the full capital cost of the project deployed through the construction phase until the project becomes operational. This is different from annual operating costs.</p>
