        text: |-
          This chart shows how how much each capital source contributes when it appears in a project’s capital stack. Each dot represents one project’s use of that capital source, expressed as a percentage of total project cost. For example, a dot at 40% means that the corresponding source of capital covered 40% of the project’s total cost.

          Use this chart to understand whether a capital source usually plays a small supporting role, a major role, or varies widely depending on the project. This helps move beyond the question of whether a source appears in the capital mix and toward the more practical question of how much it tends to contribute when it is used.

          The box summarizes the middle range of projects for each capital source in the filtered view. The line inside the box shows the typical midpoint, or median. The vertical lines (whiskers), show the wider range of values. A taller box or longer whiskers mean that the specific capital source is used very differently across projects. A tighter box means the contribution is more consistent.
