        text: |-
          Typical Project
          For each project, calculates what percentage of its own funding came from each category, then averages those percentages across all projects in the scale band. Every project counts equally regardless of size, so a $500K project has the same influence on the result as a $5M one. Best for understanding what a typical project at this scale actually looks like.
        text_color: theme:Error
