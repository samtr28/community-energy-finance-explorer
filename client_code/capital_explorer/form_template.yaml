      properties:
        background: ''
        content: |-
          <p>Community energy projects often rely on more than one source of capital. A project may combine grants, loans, community investment, owner contributions, partner funding, and other financing mechanisms to reach full project cost. These combinations are often hard to see because financing information is scattered across announcements, reports, funding programs, and project documents.</p>
          <p>The Capital Explorer makes this information easier to understand by showing the <b>capital stacks</b> behind community energy projects in the current dataset. Use this page to explore what sources of capital are being used, how financing mixes vary across different kinds of projects, and where common financing challenges appear.</p>
        font_size: 18
