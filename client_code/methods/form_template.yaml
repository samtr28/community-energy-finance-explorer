      name: text_5
      properties:
        font_size: 18
        scale: large
        text: |-
          Survey data informs the Navigator's interactive visualizations, organized around capital flows, ownership models, project outcomes, and cross-case comparison. Our data collection also documented where participants most wanted support - and this directly shaped which visualizations were developed. Semi-structured interview data will form the basis of case studies that document individual projects from multiple perspectives.

          Visualizations and educational materials derived from the data will be made publicly available through the Navigator as open-access resources, with the underlying dataset potentially published in a future phase of the project. Communities whose projects are featured will have the opportunity to review and provide feedback on how their project is presented before publication, and may withdraw their project from the platform at any time.
      type: form:dep_9kcxnwm3upyjd:_Components.Text
