          The Community Energy Finance Navigator is built to support peer learning and share research insights and decision-useful resources to support communities in their energy transition initiatives. This page explains how information is collected and how we work to make it accurate and comparable, while respecting confidentiality and community priorities.

          Below we answer common questions about our data, methods, and how to get involved.
