  - components:
    - layout_properties: {full_width_row: true, grid_position: 'RFTLOI,AMTVWF'}
      name: rich_text_4
      properties:
        content: |-
          <p>Projects are financed and structured in many different ways. To support meaningful comparison, we use common categories and definitions across the dataset.</p>

          <p>For example:</p>

          <ul>
            <li>Financing sources are grouped into consistent categories (such as grants, debt, equity, community investment, and other tools)</li>
            <li>Ownership is classified using a clear list of model types</li>
            <li>Outcomes and impacts are summarized using shared measures where data is available</li>
          </ul>

          <p>Each financing option includes examples and plain-language guidance to help ensure consistency in responses and avoid duplicate entries.</p>
        font_size: 18
        format: restricted_html
        spacing:
          margin: ['0', null, '0', null]
          padding: ['0', null, '0', null]
      type: RichText
