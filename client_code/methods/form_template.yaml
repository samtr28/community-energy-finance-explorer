  - components:
    - layout_properties: {full_width_row: true, grid_position: 'RFTLOI,AMTVWF'}
      name: text_7
      properties:
        font_size: 18
        text: |-
          Project teams contribute information voluntarily. The Navigator is designed to support peer learning and public understanding, not to evaluate or rank individual projects.

          We share information in a way that is useful while respecting confidentiality and community priorities. If you have concerns about how your project is represented, you can contact us and we will work with you to correct or adjust the entry.

          We recognize the importance of Indigenous data sovereignty and all team members are trained in OCAP principles to ensure information is shared in ways that align with a given community's protocols and priorities.

          This study has received ethics approval from the University of Victoria Research Ethics Board (Protocol #24-046). For questions about the ethics of this research, contact ethics@uvic.ca or samanthatreacy@uvic.ca
      type: form:dep_9kcxnwm3upyjd:_Components.Text
    - layout_properties: {full_width_row: true, grid_position: 'RFTLOI,IUEJCM'}
