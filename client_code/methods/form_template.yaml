      col_spacing: huge
      col_widths: '{"AMTVWF":45,"IUEJCM":15}'
      spacing:
        margin: ['0', '4', 1%, '4']
        padding: [2%, 2%, 2%, 2%]
    type: ColumnPanel
  - layout_properties: {}
