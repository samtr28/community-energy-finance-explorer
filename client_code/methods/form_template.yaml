  - components:
    - layout_properties: {full_width_row: true, grid_position: 'RFTLOI,AMTVWF'}
      name: text_6
      properties:
        font_size: 18
        text: "Project information can change as financing closes, partnerships evolve, or outcomes become measurable. We encourage project teams to update their entries as new information becomes available - whether that's a completed financing round, updated impact and outcomes metrics, or a change in project status.\n\nTo update your information, contact our team at samanthatreacy@uvic.ca and we will update your entry as needed. \n\nThe Navigator's visuals are refreshed as new projects are added and existing entries are updated. The platform will continue to grow through expanded outreach, new partnerships, and richer project data. Case studies and resources will be added over time, informed by ongoing interviews with project teams and community members.  New case studies  will be published when all interviews about a given project are completed and the draft is verified and approved for publication by project owners. "
