        padding: ['8', null, '8', null]
      text: How is the data validated?
    type: form:dep_9kcxnwm3upyjd:_Components.Button
  - components:
    - layout_properties: {full_width_row: true, grid_position: 'RFTLOI,AMTVWF'}
      name: rich_text_5
      properties:
        content: |-
          <p>We use a combination of manual and automated checks to maintain data quality.</p>

          <ul>
            <li><strong>Consistency checks</strong> to confirm totals make sense – for example that individual financing amounts add up to the reported total project cost, or within a small threshold if the respondent used estimates</li>
            <li><strong>Follow-up questions</strong> are sent by our team to the respondent when a response is unclear or appears to be missing a key element</li>
            <li><strong>Cross-referencing with</strong> publicly available sources helps verify details where possible</li>
            <li><strong>Ongoing improvements</strong> as projects update their data or provide additional details over time</li>
          </ul>

          <p>Because this is a pilot, not every project will have every data field. Where data is missing, we show that transparently. Future updates will aim to complete any missing data in addition to adding new projects.</p>
        font_size: 18
        format: restricted_html
        spacing:
          margin: ['0', null, '0', null]
          padding: ['0', null, '0', null]
      type: RichText
