    type: form:dep_9kcxnwm3upyjd:_Components.Button
  - components:
    - layout_properties: {full_width_row: true, grid_position: 'RFTLOI,AMTVWF'}
      name: rich_text_2
      properties:
        content: |-
          <p>Interviews go deeper than the survey. They give project teams the chance to share context, reflect on what worked, and describe challenges that are difficult to capture in an online survey.</p>

          <p>Topics may include:</p>

          <ul>
            <li>How the community was involved in financial decisions</li>
            <li>How financing was chosen — who led the process and what alternatives were considered</li>
            <li>How benefits are shared and whether outcomes reflect community priorities</li>
          </ul>

          <p>Insights from interviews will inform case studies, stories and resources featured on the Navigator. Participation is voluntary, and interviewees can review how their contributions are presented before publication of any case study.</p>
        font_size: 18
        format: restricted_html
        spacing:
          margin: ['0', null, '0', null]
          padding: ['0', null, '0', null]
      type: RichText
    - layout_properties: {full_width_row: true, grid_position: 'RFTLOI,IUEJCM'}
      name: spacer_3
      properties: {}
      type: Spacer
    layout_properties: {full_width_row: true}
    name: panel_interview
    properties:
      background: '#ffffff'
