  - layout_properties: {}
    name: text_1
    properties:
      text: "The Navigator draws on three sources of information about community energy projects in Canada.\nProject survey (primary source)\nMost project details come directly from project teams through a structured survey developed by our research team. The survey captures high-level information about financing, ownership, and outcomes in a consistent format designed for comparison. The survey takes roughly 30–45 minutes and was distributed to project teams through direct outreach, referrals, and partner networks.\nInterviews (context and clarification)\nFor a subset of projects, we conduct interviews with project leads,  These conversations  help us understand context, clarify survey responses, and capture lessons that may appear in forthecoming case studies.\nSecondary sources (validation and completion)\nWhere possible, we check and complement project information using publicly available sources such as project websites, public reports, press releases, and program/funder announcements. This helps validate key details and reduce gaps where survey responses are incomplete. \nFor a small number of projects where substantial public information was available, we collected data directly from these sources to broaden the dataset.\n"
    type: form:dep_9kcxnwm3upyjd:_Components.Text
  - layout_properties: {full_width_row: true}
    name: button_2
    properties: {align: full, appearance: elevated, background_color: 'theme:Secondary Container', font_size: 20, icon: 'mi:expand_more', icon_align: right, icon_color: '', text: 'What kind of information is collected in the survey?'}
