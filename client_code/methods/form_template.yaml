  - components:
    - layout_properties: {full_width_row: true, grid_position: 'RFTLOI,AMTVWF'}
      name: rich_text_1
      properties:
        content: |-
          <p>We collect information that is useful for learning and comparison, while respecting the confidentiality of sensitive financial agreements and deal terms.</p>

          <p><b>The survey covers the following topics:</b></p>

          <ul>
            <li>Basic project details (location, technology, energy production capacity, stage)</li>
            <li>High-level financing breakdown (the project's capital stack, such as grants, loans, equity, community investment, and partner contributions)</li>
            <li>Ownership model (for example co-op, municipal, Indigenous-led, community-owned, partnerships)</li>
            <li>Outcomes and community impacts (jobs created, greenhouse gas reductions, revenue sharing and other benefits where possible)</li>
          </ul>

          <p>We also ask about challenges faced during implementation, resources that would have helped, and topics participants want to learn more about. These responses directly shaped the content and resources featured on the Navigator.</p>

          <p><b>We do not request or publish:</b></p>

          <ul>
            <li>Confidential contracts or commercially sensitive terms</li>
            <li>Detailed pricing, proprietary operating data, or information you consider confidential</li>
            <li>Personal details such as demographics are collected for research purposes only and are never displayed on the Navigator</li>
          </ul>

          <p>If a question feels too sensitive, we encourage respondents to skip it. Partial entries are allowed.</p>

          <p>Each respondent chooses the level of visibility desired for their project. Anonymous participation means project data are authorized to be reflected only in aggregate charts and data, while non-anonymous participation results in projects authorized to be featured in the Project Explorer. Preferences of respondents can be adjusted at any time if they contact us to withdraw their project data from the Project Explorer.</p>
        font_size: 18
        format: restricted_html
        spacing:
          margin: ['0', null, '0', null]
          padding: ['0', null, '0', null]
      type: RichText
    - layout_properties: {full_width_row: true, grid_position: 'RFTLOI,HOYAPP'}
      name: spacer_2
      properties: {}
      type: Spacer
    layout_properties: {full_width_row: true}
    name: panel_survey
    properties:
      background: '#ffffff'
      border: '1px solid #005493'
      col_spacing: huge
      col_widths: '{"AMTVWF":45,"HOYAPP":15}'
      spacing:
        margin: ['0', '4', 1%, '4']
        padding: [2%, 2%, 2%, 2%]
    type: ColumnPanel
  - layout_properties: {}
