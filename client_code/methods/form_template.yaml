        padding: ['8', null, '8', null]
      text: What kinds of energy projects are in the Navigator?
    type: form:dep_9kcxnwm3upyjd:_Components.Button
  - components:
    - layout_properties: {full_width_row: true, grid_position: 'RFTLOI,AMTVWF'}
      name: rich_text_3
      properties:
        content: |-
          <p>The Navigator focuses on what we broadly call community energy — clean energy projects that are driven by and for the communities they serve, with local involvement in ownership, decision-making, or benefits. This includes renewable energy, electromobility, and energy efficiency projects that have moved beyond the proposal stage into active development, construction, or operation. Our geographical focus is Canada, including all provinces and territories.</p>

          <p>We also include projects that began development but did not reach completion. Documenting these experiences is just as valuable — understanding where and why projects stall helps other communities anticipate challenges and plan accordingly.</p>

          <p><strong>Project types include:</strong></p>

          <ul>
            <li>Renewable energy — solar, wind, hydro, biomass, geothermal, tidal, hydrogen</li>
            <li>Electromobility — community EV charging, electric transit</li>
            <li>Energy efficiency — building retrofits, insulation, community-wide programs</li>
            <li>District energy — community heating, cooling, or combined thermal networks</li>
          </ul>

          <p><strong>Led by or involving organizations such as:</strong></p>

          <ul>
            <li>Co-operatives and community groups</li>
            <li>Municipalities and municipal utilities</li>
            <li>Indigenous communities and Indigenous-led organizations</li>
            <li>Non-profits and community development organizations</li>
          </ul>

          <p>These are examples, not eligibility criteria. If your project involves community-led clean energy, we'd welcome your participation.</p>
        font_size: 18
        format: restricted_html
        spacing:
          margin: ['0', null, '0', null]
          padding: ['0', null, '0', null]
      type: RichText
    - layout_properties: {full_width_row: true, grid_position: 'RFTLOI,IUEJCM'}
      name: spacer_4
      properties: {}
      type: Spacer
    layout_properties: {}
    name: panel_projects
    properties:
