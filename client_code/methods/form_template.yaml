    - layout_properties: {full_width_row: true, grid_position: 'GWYAUY,QHLSES'}
      name: text_4
      properties: {font_size: 18, text: 'For a subset of projects, we conduct interviews with project leads, These conversations help us understand context, clarify survey responses, and capture lessons that may appear in forthecoming case studies.'}
