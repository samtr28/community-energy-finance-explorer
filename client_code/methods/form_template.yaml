      name: rich_text_6
      properties:
        content: |-
          <p>This is a pilot dataset. The Navigator reflects the projects that have participated so far, so it should be interpreted as a growing picture rather than a complete census of all community-led clean energy projects in Canada.</p>

          <p>A few things to keep in mind:</p>

          <ul>
            <li>Some outcomes and impact measures may be estimated or reported at different time horizons</li>
            <li>Early-stage projects may not yet have measurable outcomes to share</li>
            <li>The dataset may reflect regional or sectoral gaps depending on participation to date</li>
          </ul>

          <p>We present results based on the best available information and will continue to improve comparability as more projects are included in the dataset.</p>
        font_size: 18
        format: restricted_html
