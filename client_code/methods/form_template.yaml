    - layout_properties: {full_width_row: true, grid_position: ''}
      name: text_5
      properties:
        font_size: 18
        text: |-
          Where possible, we check and complement project information using publicly available sources such as project websites, public reports, press releases, and program/funder announcements. This helps validate key details and reduce gaps where survey responses are incomplete.

          For a small number of projects where substantial public information was available, we collected data directly from these sources to broaden the dataset.
