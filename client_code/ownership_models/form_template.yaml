      name: rich_text_1
      properties:
        background: ''
        content: |-
          <p>Ownership is a key design choice in a community energy project. It helps show who has financial stake, who may share in the value created over time, and whether benefits are more likely to stay connected to local priorities. <strong>For communities, ownership can be a pathway to participating in the energy transition as partners, investors, and long-term beneficiaries, not only as hosts or customers.</strong> Ownership also matters for financing because different owner types may bring different kinds of relationships, eligibility, credibility, risk profiles, and funding pathways.</p>

          <p>The Ownership Explorer shows how ownership is structured across projects in the current dataset. For simplicity, we group different types of organizations and owners into broad ownership categories (see key terms for more details). These categories make it easier to visualize ownership patterns across projects while recognizing that real-world ownership structures can be more complex. We also show ownership structures alongside capital sources to help users see how projects are being organized and financed in practice.</p>
        font_size: 18
        format: restricted_html
      type: RichText
    - layout_properties: {grid_position: 'IIQWHR,IUGVIF TVSYED,DGZHIG'}
      name: column_panel_2
      properties: {role: bg-image-om}
      type: ColumnPanel
    - components:
      - components:
        - layout_properties: {slot: card-content-container-slot}
          name: rich_text_5
          properties:
            content: <p><strong>Important note:</strong> Ownership is not the same as governance, although the two are related. Ownership can show who has a financial stake and who may share in project value, but it does not fully describe decision-making authority, voting rights, board structures, partnership agreements, or other governance arrangements. The Navigator explores these governance dimensions in more detail through project case studies (coming soon).</p>
            font_size: 16
            format: restricted_html
            spacing:
              margin: ['0', '0', '0', null]
              padding: ['0', null, '0', null]
          type: RichText
        - layout_properties: {slot: card-content-container-slot}
