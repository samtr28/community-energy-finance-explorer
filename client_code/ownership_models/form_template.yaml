          layout_properties: {slot: card-content-container-slot}
          name: rich_text_2
          properties:
            content: |-
              <p>
                <strong>Ownership structure:</strong> how ownership of a project is divided among different owners or owner types. In the Navigator, ownership is shown using project-reported ownership shares and, where available, dollar-value ownership stakes.<br><br>
                <strong>Ownership share:</strong> the percentage of a project owned by a given owner or owner type. For example, if a cooperative owns 40 percent of a project, its ownership share is 40 percent.<br><br>
                <strong>Dollar-value ownership stake:</strong> the estimated dollar value of an ownership share, based on the reported project value or total project cost. This helps show the scale of ownership participation, since a small percentage in a very large project may still represent a significant financial stake.<br><br>
                <strong>Owner type:</strong> the kind of organization or entity that holds an ownership stake in a project. Survey responses included many owner types (27), which we grouped into broader categories to make the dashboard easier to read.<br><br>
                <strong>Ownership category:</strong> a simplified grouping of owner types used for visualization.
              </p>
            font_size: 16
            format: restricted_html
            spacing:
              margin: ['0', null, '0', null]
