      name: rich_text_1
      properties:
        background: ''
        content: |-
          <p>Community energy projects can be owned in many different ways. A project may involve a single community organization, or it may share ownership across multiple partners — including municipalities, Indigenous nations, cooperatives, non-profits, and private developers. These arrangements shape who benefits, who decides, and how value flows back into communities.</p>

          <p>The Ownership Explorer makes these structures easier to understand by showing the <b>ownership models</b> behind community energy projects in the current dataset. Use this page to explore who owns what, how ownership is distributed across project types and regions, and where community control is strongest.</p>
        font_size: 18
        format: restricted_html
