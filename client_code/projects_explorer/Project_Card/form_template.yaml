components:
- components:
  - components:
    - components:
      - data_bindings:
        - {code: 'self.item[''project_name'']', property: text, writeback: false}
        layout_properties: {grid_position: 'ZIOHFB,DMFPRR'}
        name: project_lbl
        properties: {bold: true, font_size: 20, scale: large, style: title, text_color: 'theme:On Primary'}
        type: form:dep_9kcxnwm3upyjd:_Components.Heading
      - data_bindings:
        - {code: 'self.item[''data_source'']', property: message, writeback: false}
        layout_properties: {grid_position: 'ZIOHFB,GWVKSL XVIHES,YZANNV'}
        name: data_source_pill
        properties: {level: info, message: 'self.item[''data_source'']'}
        type: form:dep_ar2wlcmlppsllr:MessagePill
      - data_bindings:
        - {code: 'self.item[''portfolio_text'']', property: message, writeback: false}
        layout_properties: {grid_position: 'ZIOHFB,GWVKSL WKHESR,VMAXGW'}
        name: portfolio_pill
        properties: {level: info, message: ''}
        type: form:dep_ar2wlcmlppsllr:MessagePill
      layout_properties: {slot: card-content-container-slot}
      name: column_panel_2
      properties:
        background: theme:On Secondary Container
        col_spacing: small
        col_widths: '{"DMFPRR":30,"GWVKSL":30}'
        spacing:
          margin: ['-8', '-8', '0', '-8']
          padding: ['8', '8', '0', '8']
      type: ColumnPanel
    - components:
      - components:
        - data_bindings:
          - {code: 'self.item[''project_type_formatted'']', property: text, writeback: false}
          layout_properties: {slot: type_slot}
          name: type
          properties: {bold: false, font_size: null, scale: medium, style: body, text_color: 'theme:On Secondary'}
          type: form:dep_9kcxnwm3upyjd:_Components.Text
        - layout_properties: {slot: icon1_slot}
          name: type_icon_1
          properties: {background_color: 'theme:Secondary Container', enabled: true, icon: '', icon_color: 'theme:On Primary Container'}
          type: form:dep_9kcxnwm3upyjd:_Components.IconButton
        - layout_properties: {slot: icon2_slot}
          name: type_icon_2
          properties: {background_color: 'theme:Secondary Container', enabled: true, icon: '', icon_color: 'theme:On Primary Container'}
          type: form:dep_9kcxnwm3upyjd:_Components.IconButton
        - layout_properties: {slot: icon3_slot}
          name: type_icon_3
          properties: {background_color: 'theme:Secondary Container', enabled: true, icon: '', icon_color: 'theme:On Primary Container'}
          type: form:dep_9kcxnwm3upyjd:_Components.IconButton
        - layout_properties: {slot: icon4_slot}
          name: type_icon_4
          properties: {appearance: standard, background_color: 'theme:Secondary Container', enabled: true, icon: '', icon_color: 'theme:On Primary Container'}
          type: form:dep_9kcxnwm3upyjd:_Components.IconButton
        layout_properties: {full_width_row: true, grid_position: 'YGHQWY,YIWIMA'}
        name: type_panel
        properties:
          background: theme:Accent Text
          content: |-
            {icon1_slot}{icon2_slot}{icon3_slot}{icon4_slot}
            <br>
            Project type:  {type_slot}
          foreground: theme:On Primary
          format: restricted_html
          spacing:
            margin: [null, '-8', null, '-8']
            padding: ['2', '8', '2', '8']
          spacing_above: none
          spacing_below: none
          visible: true
        type: RichText
      - components:
        - data_bindings:
          - {code: 'self.item[''total_cost'']', property: text, writeback: false}
          layout_properties: {slot: cost_slot}
          name: cost
          properties: {bold: true, font_size: 16}
          type: form:dep_9kcxnwm3upyjd:_Components.Text
        layout_properties: {full_width_row: true, grid_position: 'ZWSBYP,ACMTFS'}
        name: total_cost_rich_text
        properties: {content: 'Total Cost:<br> $ {cost_slot}', format: restricted_html, spacing_above: none, spacing_below: none, visible: true}
        type: RichText
      - components:
        - data_bindings:
          - {code: 'self.item[''location_text'']', property: text, writeback: false}
          layout_properties: {slot: community_slot}
          name: community
          properties: {bold: true, font_size: 16}
          type: form:dep_9kcxnwm3upyjd:_Components.Text
        layout_properties: {grid_position: 'ZWSBYP,ZETNWC'}
        name: total_cost_rich_text_3
        properties: {content: 'Community:<br> {community_slot}', format: restricted_html, spacing_above: none, spacing_below: none, visible: true}
        type: RichText
      - components:
        - data_bindings:
          - {code: 'self.item[''stage'']', property: text, writeback: false}
          layout_properties: {slot: stage_slot}
          name: stage
          properties: {bold: true, font_size: 16}
          type: form:dep_9kcxnwm3upyjd:_Components.Text
        layout_properties: {grid_position: 'ZWSBYP,YCTHKK'}
        name: total_cost_rich_text_2
        properties: {content: 'Stage:<br> {stage_slot}', format: restricted_html, spacing_above: none, spacing_below: none, visible: true}
        type: RichText
      - data_bindings:
        - {code: 'self.item[''capital_mix_traces'']', property: data, writeback: false}
        layout_properties: {full_width_row: true, grid_position: 'UWHTEW,BTWISE'}
        name: capital_mix_plot
        properties:
          height: 15vh
          margin: ['2', null, '2', null]
        type: Plot
      - data_bindings:
        - {code: 'self.item[''ownership_traces'']', property: data, writeback: false}
        layout_properties: {full_width_row: true, grid_position: 'MDASIK,WXALIE'}
        name: ownership_plot
        properties:
          height: 10vh
          margin: ['2', null, '2', null]
        type: Plot
      - event_bindings: {click: toggle_sub_list}
        layout_properties: {full_width_row: true, grid_position: 'GECVZB,SCTIOP'}
        name: sub_projects_label
        properties:
          align: full
          appearance: text
          background_color: theme:On Primary Container
          font_size: 20
          icon: mi:grid_view
          icon_color: theme:On Primary
          icon_size: 20
          spacing:
            margin: [null, '0', null, '0']
          text_color: theme:On Primary
        type: form:dep_9kcxnwm3upyjd:_Components.Button
      layout_properties: {slot: card-content-container-slot}
      name: column_panel_1
      properties:
        col_spacing: large
        col_widths: '{"ACMTFS":15,"ZETNWC":30,"YCTHKK":15}'
        spacing:
          margin: ['0', null, '0', null]
      type: ColumnPanel
    - layout_properties: {slot: card-content-container-slot}
      name: sub_projects_list
      properties:
        background: ''
        item_template: projects_explorer.Project_Card.SubProjectRow
        margin: ['0', null, '0', null]
        visible: true
      type: RepeatingPanel
    - event_bindings: {click: show_more_click}
      layout_properties: {slot: card-content-container-slot}
      name: show_more_link
      properties: {align: center, bold: true, font_size: 18, underline: true, visible: false}
      type: form:dep_9kcxnwm3upyjd:_Components.Link
    layout_properties: {slot: card-content-slot}
    name: card_content_container_2
    properties:
      margin: ['4', '8', '4', '8']
    type: form:dep_9kcxnwm3upyjd:_Components.Card.CardContentContainer
  event_bindings: {click: project_card_click}
  layout_properties: {full_width_row: true, grid_position: 'HXJKRZ,SATLEW'}
  name: project_card
  properties: {appearance: elevated, background_color: 'theme:On Primary', enabled: true, role: null}
  type: form:dep_9kcxnwm3upyjd:_Components.InteractiveCard
container: {type: ColumnPanel}
is_package: true
